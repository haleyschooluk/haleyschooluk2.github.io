<html>

<head>
    <title>Star Wing</title>
    <meta charset='utf-8' />

    <meta name='viewport'
        content='width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no' />
    <meta name='apple-mobile-web-app-capable' content='yes' />
    <meta name='full-screen' content='true' />
    <meta name='x5-fullscreen' content='true' />
    <meta name='360-fullscreen' content='true' />
    <meta name='laya' screenorientation='landscape' />

    <script>
    window["GD_OPTIONS"] = {                    
      "gameId": "66952e35ad404b03b085bc996a952124",
      "onEvent": function(event) {
          switch (event.name) {
            case "SDK_GAME_START":
                // advertisement done, resume game logic and unmute audio
                Laya.timer.scale = 1;
                Laya.updateTimer.resume();
                Laya.sdkMgr.resumeMusic();                   
                break;
            case "SDK_GAME_PAUSE":
                // pause game logic / mute audio             
                Laya.timer.scale = 0;
                Laya.updateTimer.pause();
                Laya.sdkMgr.pauseMusic();
                break;
            case "SDK_GDPR_TRACKING":
                // this event is triggered when your user doesn't want to be tracked
                break;
            case "SDK_GDPR_TARGETING":
                // this event is triggered when your user doesn't want personalised targeting of ads and such
                break;
            case "AD_SDK_REQUEST_ADS":
                break;
            case "AD_SDK_FINISHED":

                break;
            case "AD_SDK_ERROR":
            case "AD_CANCELED":
                      
                break;
            case "SDK_READY":
                if (gdsdk !== 'undefined' && gdsdk.preloadAd !== 'undefined') {
                  gdsdk.preloadAd('rewarded').then(response => {
                     
                  }).catch(error => {
                    
                  });
                }
                break;
            case "SDK_REWARDED_WATCH_COMPLETE":
                if(Laya.sdkMgr !== 'undefined')
                  Laya.sdkMgr.finishReward();
                break;
          }
        },
      };
      (function(d, s, id) {
        var js, fjs = d.getElementsByTagName(s)[0];
        if (d.getElementById(id)) return;
        js = d.createElement(s);
        js.id = id;
        js.src = '/main.min.js';
        fjs.parentNode.insertBefore(js, fjs);
      }(document, 'script', 'gamedistribution-jssdk'));
    </script>
</head>

<body bgcolor="#000000">
    <script type="text/javascript">
        function loadLib(url) {
            var script = document.createElement("script");
            script.async = false;
            script.src = url;
            document.body.appendChild(script);
        }

        var loadJs = function (url, cb) {
            var script = document.createElement("script");
            script.async = false;
            script.src = url;
            document.body.appendChild(script);
            if (cb != null) {
                script.onload = cb;
            }
        }

        loadJs("index.js", function () {

        });

        window.addEventListener("keydown", (event) => {
            if (["ArrowUp", "ArrowDown", " "].includes(event.key)) {
                event.preventDefault();
            }
        });
        
        window.addEventListener("wheel", (event) => event.preventDefault(), {
            passive: false,
        });
    </script>
</body>

</html>
